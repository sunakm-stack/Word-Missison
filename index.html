<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Word Mission Game</title>
<style>
body { font-family: Arial; background:#111827; color:white; text-align:center; }
button { padding:10px 20px; margin:10px; font-size:18px; cursor:pointer; }
.hidden { display:none; }
</style>
</head>
<body>

<h1>Word Mission Game</h1>
<button id="startBtn">🚀 게임 시작</button>

<div id="game" class="hidden">
  <h2 id="question"></h2>
  <div id="choices"></div>
</div>

<script>
const questions = [
  {q:"rain의 뜻은?", choices:["비","눈","바람","구름"], answer:0},
  {q:"eat의 뜻은?", choices:["걷다","먹다","읽다","보다"], answer:1},
  {q:"walk의 뜻은?", choices:["걷다","달리다","앉다","자다"], answer:0}
];

let current = 0;

const startBtn = document.getElementById("startBtn");
const game = document.getElementById("game");
const questionEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");

startBtn.onclick = () => {
  startBtn.classList.add("hidden");
  game.classList.remove("hidden");
  showQuestion();
};

function showQuestion(){
  const q = questions[current];
  questionEl.textContent = q.q;
  choicesEl.innerHTML = "";
  q.choices.forEach((choice,i)=>{
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.onclick = ()=> checkAnswer(i);
    choicesEl.appendChild(btn);
  });
}

function checkAnswer(i){
  if(i === questions[current].answer){
    alert("정답!");
  } else {
    alert("오답!");
  }
  current++;
  if(current < questions.length){
    showQuestion();
  } else {
    alert("게임 끝!");
    location.reload();
  }
}
</script>

</body>
</html>

<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Word Mission Game (120) - Offline Web App</title>
  <style>
    :root {

      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 18px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", "Apple SD Gothic Neo", Arial, sans-serif;
    }
    body { margin:0; background: radial-gradient(1200px 600px at 20% 0%, #1a2550, var(--bg)); color:var(--text); }
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px; }
    header { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom: 16px; }
    .brand { display:flex; align-items:center; gap:12px; }
    .logo { width:44px; height:44px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), #bb9af7); box-shadow: var(--shadow); }
    h1 { font-size: 18px; margin:0; line-height:1.2; }
    .sub { color:var(--muted); font-size: 13px; margin-top:4px; }
    .pill { font-size:12px; padding:6px 10px; border:1px solid var(--line); border-radius: 999px; color:var(--muted); background: rgba(255,255,255,.04); }
    .row { display:flex; gap:16px; flex-wrap:wrap; }
    .card { background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)); border:1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }
    .pad { padding: 18px; }
    .grow { flex: 1 1 420px; }
    .side { flex: 1 1 260px; }
    .btn { cursor:pointer; border:none; border-radius: 14px; padding: 12px 14px; font-weight: 700; color: var(--text);
            background: rgba(255,255,255,.08); border:1px solid var(--line); }
    .btn:hover { filter: brightness(1.05); }
    .btn.primary { background: linear-gradient(135deg, var(--accent), #bb9af7); border:none; }
    .btn.good { background: rgba(158,206,106,.15); border:1px solid rgba(158,206,106,.35); }
    .btn.warn { background: rgba(224,175,104,.16); border:1px solid rgba(224,175,104,.35); }
    .btn.bad { background: rgba(247,118,142,.15); border:1px solid rgba(247,118,142,.35); }
    .btn.slim { padding: 10px 12px; border-radius: 12px; font-weight: 650; }
    .grid2 { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid4 { display:grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    @media (min-width: 760px) { .grid4 { grid-template-columns: repeat(4, 1fr); } }
    input { width: 100%; padding: 12px 12px; border-radius: 14px; border:1px solid var(--line);
      background: rgba(0,0,0,.25); color: var(--text); outline: none; }
    label { display:block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .hud { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom: 10px; flex-wrap:wrap; }
    .meter { height: 10px; background: rgba(255,255,255,.06); border:1px solid var(--line); border-radius: 999px; overflow:hidden; }
    .bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), #bb9af7); }
    .muted { color: var(--muted); }
    .big { font-size: 22px; font-weight: 850; letter-spacing: -.02em; }
    .qtext { font-size: 16px; line-height: 1.55; white-space: pre-wrap; }
    .choice { text-align:left; }
    .choice.selected { outline: 2px solid rgba(122,162,247,.65); }
    .tagrow { display:flex; gap:8px; flex-wrap:wrap; margin-top: 10px; }
    .tag { font-size: 11px; padding: 6px 10px; border-radius: 999px; border:1px solid var(--line); background: rgba(255,255,255,.04); color: var(--muted); }
    .map { display:grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 760px) { .map { grid-template-columns: repeat(3, 1fr); } }
    .node { padding: 14px; border-radius: 16px; border:1px solid var(--line); background: rgba(0,0,0,.20); }
    .node h3 { margin:0 0 4px 0; }
    .node .desc { color: var(--muted); font-size: 12px; line-height: 1.35; }
    .node.locked { opacity: .55; }
    .node .stars { margin-top: 10px; color: var(--warn); font-size: 14px; }
    .hr { height: 1px; background: var(--line); margin: 14px 0; }
    .small { font-size: 12px; }
    .kbd { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            font-size: 12px; padding: 2px 6px; border-radius: 8px; background: rgba(255,255,255,.08); border: 1px solid var(--line); }
    .footer { margin-top: 22px; color: var(--muted); font-size: 12px; line-height: 1.55; }
    .toast { position: fixed; right: 14px; bottom: 14px; background: rgba(18,26,51,.92); border:1px solid var(--line);
             color: var(--text); padding: 12px 14px; border-radius: 14px; box-shadow: var(--shadow); display:none; max-width: 360px; }

    /* image block */
    .imgWrap { margin: 12px 0; display:flex; justify-content:center; }
    .qimg { max-width:100%; width:360px; height:auto; border-radius:14px; border:1px solid var(--line); background: rgba(0,0,0,.18); }
  </style>
</head>

  // ====== Recommended defaults ======
  const DEFAULTS = {
    mode: "TEST",
    shuffleChoices: true,
    timerEnabled: false,
    unlockRule: "score28"
  };

  const KEY = { state: "wm_state_v1", attempts: "wm_attempts_v1" };

  function nowISO(){ return new Date().toISOString(); }
  function clamp(n,a,b){ return Math.max(a, Math.min(b,n)); }
  function toast(msg){
    const t=document.getElementById("toast");
    t.textContent=msg; t.style.display="block";
    clearTimeout(toast._timer);
    toast._timer=setTimeout(()=>t.style.display="none", 2400);
  }
  function setStatus(text){ document.getElementById("statusPill").textContent=text; }

  function saveState(s){ localStorage.setItem(KEY.state, JSON.stringify(s)); }
  function loadState(){ try{ const r=localStorage.getItem(KEY.state); return r?JSON.parse(r):null; }catch(e){ return null; } }
  function saveAttempts(a){ localStorage.setItem(KEY.attempts, JSON.stringify(a)); }
  function loadAttempts(){ try{ const r=localStorage.getItem(KEY.attempts); return r?JSON.parse(r):[]; }catch(e){ return []; } }

  function download(filename, content, type="application/json"){
    const blob=new Blob([content], {type});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=filename;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }
  function toCSV(rows){
    const esc=(v)=>{
      const s=String(v ?? "");
      if (/[",\n]/.test(s)) return '"' + s.replaceAll('"','""') + '"';
      return s;
    };
    return rows.map(r=>r.map(esc).join(",")).join("\n");
  }
  function normalizeAnswer(text, rules){
    let t=(text ?? "");
    if (rules?.includes("trim")) t=t.trim();
    if (rules?.includes("lowercase")) t=t.toLowerCase();
    if (rules?.includes("collapseSpaces")) t=t.replace(/\s+/g," ");
    return t;
  }
  function makeSessionId(){ return "S"+Math.random().toString(16).slice(2)+"-"+Date.now().toString(16); }
  function sectionLabel(sec){
    if (sec==="ROOKIE") return "🟢 ROOKIE";
    if (sec==="EXPLORER") return "🔵 EXPLORER";
    if (sec==="MASTER") return "🔴 MASTER";
    return sec;
  }
  function getSectionQuestions(section){ return QUESTION_BANK.filter(q=>q.section===section); }

  function computeScore(answersById){
    let total=0;
    const bySection={ROOKIE:0, EXPLORER:0, MASTER:0};
    for (const q of QUESTION_BANK){
      const a=answersById[q.id];
      if (!a) continue;
      let correct=false;
      if (q.type==="mcq"){
        correct = (a.choiceIndex === q.answer);
      } else {
        const norm=normalizeAnswer(a.text, q.normalize);
        correct = (q.answers||[]).some(x=>normalizeAnswer(x, q.normalize)===norm);
      }
      if (correct){ total += 1; bySection[q.section] += 1; }
    }
    return { total, bySection };
  }
  function levelFromScore(score){
    if (score <= 50) return "ROOKIE";
    if (score <= 85) return "EXPLORER";
    return "MASTER";
  }
  function starsForSection(secScore){
    if (secScore >= 36) return 3;
    if (secScore >= 30) return 2;
    if (secScore >= 24) return 1;
    return 0;
  }

  const initial = {
    phase: "START",
    config: {...DEFAULTS},
    player: { name:"", group:"" },
    sessionId: null,
    section: "ROOKIE",
    indexInSection: 0,
    answers: {},
    unlocked: { ROOKIE:true, EXPLORER:false, MASTER:false },
    startedAt: null,
    finishedAt: null
  };

  let state = loadState() || initial;
  let attempts = loadAttempts();

  function resetAll(){
    state = JSON.parse(JSON.stringify(initial));
    saveState(state);
    toast("초기화 완료");
    render();
  }

  function startNewSession(){
    state.sessionId = makeSessionId();
    state.startedAt = nowISO();
    state.finishedAt = null;
    state.answers = {};
    state.section = "ROOKIE";
    state.indexInSection = 0;
    state.unlocked = { ROOKIE:true, EXPLORER:false, MASTER:false };
    state.phase = "MAP";
    saveState(state);
    render();
  }

  function beginSection(section){
    if (!state.unlocked[section]){ toast("잠금 상태입니다. 이전 미션을 통과하세요."); return; }
    state.section = section;
    state.indexInSection = 0;
    state.phase = "PLAY";
    saveState(state);
    render();
  }

  function getCurrentQuestion(){
    const qs = getSectionQuestions(state.section);
    return qs[state.indexInSection] || null;
  }

  function shuffledChoices(q){
    if (!q.choices) return null;
    const key = "choicesShuffle:" + state.sessionId + ":" + q.id;
    const existing = state.answers[key];
    if (existing && Array.isArray(existing.order)) return existing.order;
    const order = q.choices.map((_,i)=>i);
    if (state.config.shuffleChoices){
      for (let i=order.length-1; i>0; i--){
        const j = Math.floor(Math.random()*(i+1));
        [order[i], order[j]] = [order[j], order[i]];
      }
    }
    state.answers[key] = {order};
    saveState(state);
    return order;
  }

  function submitMCQ(q, displayedIndex){
    const order = shuffledChoices(q);
    const originalIndex = order[displayedIndex];
    state.answers[q.id] = { choiceIndex: originalIndex, ts: nowISO() };
    saveState(state);
  }

  function submitShort(q, text){
    state.answers[q.id] = { text, ts: nowISO() };
    saveState(state);
  }

  function nextQuestion(){
    const qs = getSectionQuestions(state.section);
    state.indexInSection = clamp(state.indexInSection + 1, 0, qs.length);
    if (state.indexInSection >= qs.length){
      const score = computeScore(state.answers).bySection[state.section];
      if (state.config.unlockRule === "score28"){
        if (state.section==="ROOKIE" && score >= 28) state.unlocked.EXPLORER = true;
        if (state.section==="EXPLORER" && score >= 28) state.unlocked.MASTER = true;
      } else {
        if (state.section==="ROOKIE") state.unlocked.EXPLORER = true;
        if (state.section==="EXPLORER") state.unlocked.MASTER = true;
      }
      state.phase = "SECTION_RESULT";
      saveState(state);
    } else {
      saveState(state);
    }
    render();
  }

  function finishAll(){
    state.finishedAt = nowISO();
    state.phase = "FINAL";
    const score = computeScore(state.answers);
    const attempt = {
      sessionId: state.sessionId,
      player: state.player,
      startedAt: state.startedAt,
      finishedAt: state.finishedAt,
      config: state.config,
      scoreTotal: score.total,
      scoreBySection: score.bySection,
      level: levelFromScore(score.total),
      answers: state.answers
    };
    attempts.unshift(attempt);
    saveAttempts(attempts);
    saveState(state);
    render();
  }

  function exportLatestJSON(){
    const attempt = attempts[0];
    if (!attempt){ toast("저장된 시도가 없습니다."); return; }
    download(`word-mission-attempt-${attempt.sessionId}.json`, JSON.stringify(attempt, null, 2), "application/json");
    toast("JSON 저장 완료");
  }

  function exportLatestCSV(){
    const attempt = attempts[0];
    if (!attempt){ toast("저장된 시도가 없습니다."); return; }
    const rows = [];
    rows.push(["sessionId","name","group","startedAt","finishedAt","level","scoreTotal","rookie","explorer","master"]);
    rows.push([
      attempt.sessionId,
      attempt.player?.name ?? "",
      attempt.player?.group ?? "",
      attempt.startedAt,
      attempt.finishedAt,
      attempt.level,
      attempt.scoreTotal,
      attempt.scoreBySection?.ROOKIE ?? 0,
      attempt.scoreBySection?.EXPLORER ?? 0,
      attempt.scoreBySection?.MASTER ?? 0
    ]);
    rows.push([]);
    rows.push(["questionId","section","type","prompt","studentAnswer","isCorrect"]);
    for (const q of QUESTION_BANK){
      const a = attempt.answers[q.id];
      let student="";
      let correct=false;
      if (q.type==="mcq"){
        const idx = a?.choiceIndex;
        student = (idx===undefined) ? "" : (q.choices[idx] ?? "");
        correct = (idx === q.answer);
      } else {
        student = a?.text ?? "";
        const norm = normalizeAnswer(student, q.normalize);
        correct = (q.answers||[]).some(x=>normalizeAnswer(x, q.normalize)===norm);
      }
      rows.push([q.id, q.section, q.type, q.prompt.replaceAll("\n"," "), student, correct ? "1":"0"]);
    }
    download(`word-mission-attempt-${attempt.sessionId}.csv`, toCSV(rows), "text/csv;charset=utf-8");
    toast("CSV 저장 완료");
  }

  function exportAllAttemptsJSON(){
    download("word-mission-all-attempts.json", JSON.stringify(attempts, null, 2), "application/json");
    toast("전체 기록 JSON 저장 완료");
  }

  function importAttemptJSON(file){
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const obj = JSON.parse(reader.result);
        if (!obj.sessionId || !obj.answers) throw new Error("형식 오류");
        attempts.unshift(obj);
        saveAttempts(attempts);
        toast("가져오기 완료 (최근 기록에 추가)");
        render();
      }catch(e){
        toast("가져오기 실패: JSON 형식을 확인하세요.");
      }
    };
    reader.readAsText(file);
  }

  function el(tag, attrs={}, ...children){
    const node = document.createElement(tag);
    for (const [k,v] of Object.entries(attrs)){
      if (k === "class") node.className = v;
      else if (k.startsWith("on") && typeof v === "function") node.addEventListener(k.slice(2).toLowerCase(), v);
      else node.setAttribute(k, v);
    }
    for (const c of children){
      if (c === null || c === undefined) continue;
      if (typeof c === "string") node.appendChild(document.createTextNode(c));
      else node.appendChild(c);
    }
    return node;
  }

  function renderStart(){
    setStatus("Ready");
    const main = el("div", {class:"card pad grow"},
      el("div", {class:"big"}, "시작하기"),
      el("div", {class:"muted small"}, "추천 설정으로 바로 진행됩니다 (TEST 모드 · 타이머 OFF · 보기 셔플 ON)."),
      el("div", {class:"hr"}),
      el("div", {class:"grid2"},
        el("div", {}, el("label", {}, "학생 이름(또는 닉네임)"),
          el("input", {value: state.player.name, placeholder:"예: 1-3 김OO", oninput:(e)=>{ state.player.name=e.target.value; saveState(state); }})
        ),
        el("div", {}, el("label", {}, "반/학급(선택)"),
          el("input", {value: state.player.group, placeholder:"예: 1학년 3반", oninput:(e)=>{ state.player.group=e.target.value; saveState(state); }})
        ),
      ),
      el("div", {class:"hr"}),
      el("div", {class:"row"},
        el("button", {class:"btn primary", onclick: ()=>startNewSession()}, "🚀 게임 시작"),
        el("button", {class:"btn warn", onclick: ()=>{ state.phase="MAP"; saveState(state); render(); }}, "🗺️ 맵으로"),
        el("button", {class:"btn bad", onclick: ()=>resetAll()}, "🧹 전체 초기화")
      )
    );

    const side = el("div", {class:"card pad side"},
      el("div", {class:"big"}, "교사용 파일 저장"),
      el("div", {class:"muted small"}, "게임 기록을 JSON/CSV로 저장해 두고두고 확인할 수 있어요."),
      el("div", {class:"hr"}),
      el("button", {class:"btn slim good", onclick: ()=>exportAllAttemptsJSON()}, "📦 전체 기록 JSON 저장"),
      el("div", {class:"hr"}),
      el("label", {}, "기록 JSON 가져오기"),
      el("input", {type:"file", accept:"application/json", onchange:(e)=>{ const f=e.target.files?.[0]; if (f) importAttemptJSON(f); }})
    );

    return el("div", {class:"row"}, main, side);
  }

  function nodeCard(section, title, desc){
    const unlocked = !!state.unlocked[section];
    const score = computeScore(state.answers).bySection[section];
    const stars = starsForSection(score);
    return el("div", {class:"node" + (unlocked ? "" : " locked")},
      el("h3", {}, title),
      el("div", {class:"desc"}, desc),
      el("div", {class:"stars"}, "★".repeat(stars) + "☆".repeat(3-stars)),
      el("div", {class:"hr"}),
      el("button", {class:"btn primary", onclick: ()=>beginSection(section)}, unlocked ? "시작" : "잠김")
    );
  }

  function renderMap(){
    setStatus("Map");
    const main = el("div", {class:"card pad grow"},
      el("div", {class:"big"}, "Mission Map"),
      el("div", {class:"muted small"}, "ROOKIE 28점 이상 → EXPLORER Unlock · EXPLORER 28점 이상 → MASTER Unlock"),
      el("div", {class:"hr"}),
      el("div", {class:"map"},
        nodeCard("ROOKIE","🟢 ROOKIE (1–40)","4지선다: 뜻/상황(이미지)/빈칸"),
        nodeCard("EXPLORER","🔵 EXPLORER (41–80)","4지선다: 문맥 의미 추론"),
        nodeCard("MASTER","🔴 MASTER (81–120)","단답형: 1단어 쓰기 (정답 1개 고정)")
      ),
      el("div", {class:"hr"}),
      el("div", {class:"row"},
        el("button", {class:"btn", onclick: ()=>{ state.phase="START"; saveState(state); render(); }}, "⬅️ 시작"),
        el("button", {class:"btn warn", onclick: ()=>{ state.phase="FINAL"; saveState(state); render(); }}, "📊 리포트(임시)")
      )
    );

    const sc = computeScore(state.answers);
    const side = el("div", {class:"card pad side"},
      el("div", {class:"big"}, "현재 점수"),
      el("div", {class:"muted small"}, `총점 ${sc.total}/120`),
      el("div", {class:"tagrow"},
        el("span", {class:"tag"}, `ROOKIE ${sc.bySection.ROOKIE}/40`),
        el("span", {class:"tag"}, `EXPLORER ${sc.bySection.EXPLORER}/40`),
        el("span", {class:"tag"}, `MASTER ${sc.bySection.MASTER}/40`)
      ),
      el("div", {class:"hr"}),
      el("button", {class:"btn bad slim", onclick: ()=>resetAll()}, "🧹 초기화")
    );

    return el("div", {class:"row"}, main, side);
  }

  function renderPlay(){
    const q = getCurrentQuestion();
    if (!q){ state.phase="SECTION_RESULT"; saveState(state); return renderSectionResult(); }
    setStatus(sectionLabel(state.section));

    const qs = getSectionQuestions(state.section);
    const progress = Math.round((state.indexInSection/qs.length)*100);
    const sc = computeScore(state.answers);

    const meter = el("div", {class:"meter"}, el("div", {class:"bar", style:`width:${progress}%`}));
    const hud = el("div", {class:"hud"},
      el("div", {}, el("div", {class:"muted small"}, `${sectionLabel(state.section)} · 문항 ${state.indexInSection+1}/${qs.length}`), meter),
      el("div", {}, el("div", {class:"muted small"}, `총점 ${sc.total}/120`))
    );

    const main = el("div", {class:"card pad grow"},
      hud,
      el("div", {class:"qtext"}, q.prompt),
      el("div", {class:"tagrow"}, ...(q.tags||[]).map(t=>el("span", {class:"tag"}, t))),
      el("div", {class:"hr"})
    );

    // ✅ 이미지 문항 지원
    if (q.image){
      main.appendChild(
        el("div", {class:"imgWrap"},
          el("img", {class:"qimg", src:q.image, alt:"mission image",
            onerror: ()=>toast("⚠️ 이미지가 없어요. GitHub 저장소에 assets/img/*.png가 업로드되어 있는지 확인하세요.")
          })
        )
      );
      main.appendChild(el("div", {class:"hr"}));
    }

    if (q.type==="mcq"){
      const order = shuffledChoices(q);
      const displayed = order.map(i=>q.choices[i]);
      const prev = state.answers[q.id]?.choiceIndex;
      const selectedDisplayedIndex = (prev===undefined) ? null : order.indexOf(prev);

      const btns = displayed.map((text,i)=>{
        const isSelected = (i===selectedDisplayedIndex);
        return el("button", {class:"btn choice"+(isSelected?" selected":""), onclick: ()=>{ submitMCQ(q,i); render(); }},
          String.fromCharCode(65+i)+") "+text
        );
      });

      main.appendChild(el("div", {class:"grid4"}, ...btns));
      main.appendChild(el("div", {class:"hr"}));
      main.appendChild(el("div", {class:"row"},
        el("button", {class:"btn primary", onclick: ()=>nextQuestion()}, "다음 ▶"),
        el("button", {class:"btn", onclick: ()=>{ state.phase="MAP"; saveState(state); render(); }}, "🗺️ 맵")
      ));
    } else {
      const prevText = state.answers[q.id]?.text ?? "";
      main.appendChild(el("input", {value: prevText, placeholder:"정답 단어 1개 입력",
        oninput:(e)=>{ submitShort(q,e.target.value); }
      }));
      main.appendChild(el("div", {class:"hr"}));
      main.appendChild(el("div", {class:"row"},
        el("button", {class:"btn primary", onclick: ()=>nextQuestion()}, "다음 ▶"),
        el("button", {class:"btn", onclick: ()=>{ state.phase="MAP"; saveState(state); render(); }}, "🗺️ 맵")
      ));
    }

    const side = el("div", {class:"card pad side"},
      el("div", {class:"big"}, "도구"),
      el("div", {class:"muted small"}, "TEST 모드: 정답 즉시 공개 없음"),
      el("div", {class:"hr"}),
      el("button", {class:"btn slim warn", onclick: ()=>{ state.phase="SECTION_RESULT"; saveState(state); render(); }}, "📌 섹션 결과"),
      el("button", {class:"btn slim bad", onclick: ()=>resetAll()}, "🧹 초기화")
    );

    return el("div", {class:"row"}, main, side);
  }

  function renderSectionResult(){
    setStatus("Section Result");
    const qs = getSectionQuestions(state.section);
    const score = computeScore(state.answers).bySection[state.section];
    const passed = score >= 28;
    const nextSec = (state.section==="ROOKIE") ? "EXPLORER" : (state.section==="EXPLORER") ? "MASTER" : null;

    const main = el("div", {class:"card pad grow"},
      el("div", {class:"big"}, `${sectionLabel(state.section)} 결과`),
      el("div", {class:"muted small"}, `점수: ${score}/${qs.length} · 통과 기준: 28점`),
      el("div", {class:"hr"}),
      el("div", {class:"tagrow"},
        el("span", {class:"tag"}, passed ? "✅ PASS" : "⚠️ TRY AGAIN"),
        el("span", {class:"tag"}, `별: ${"★".repeat(starsForSection(score))}${"☆".repeat(3-starsForSection(score))}`)
      ),
      el("div", {class:"hr"}),
      el("div", {class:"row"},
        nextSec ? el("button", {class:"btn primary", onclick: ()=>{
          if (!passed){ toast("28점 이상이면 다음 미션이 열립니다."); return; }
          if (state.section==="ROOKIE") state.unlocked.EXPLORER = true;
          if (state.section==="EXPLORER") state.unlocked.MASTER = true;
          saveState(state);
          beginSection(nextSec);
        }}, `다음 미션 (${sectionLabel(nextSec)})`) : null,
        el("button", {class:"btn good", onclick: ()=>{ state.phase="MAP"; saveState(state); render(); }}, "🗺️ 맵"),
        el("button", {class:"btn", onclick: ()=>beginSection(state.section)}, "🔁 다시")
      ),
      el("div", {class:"hr"}),
      (state.section==="MASTER"
        ? el("button", {class:"btn primary", onclick: ()=>finishAll()}, "🏁 최종 리포트")
        : el("div", {class:"muted small"}, "MASTER까지 완료하면 최종 리포트/파일 저장이 활성화됩니다.")
      )
    );

    const side = el("div", {class:"card pad side"},
      el("div", {class:"big"}, "빠른 이동"),
      el("button", {class:"btn slim", onclick: ()=>{ state.phase="MAP"; saveState(state); render(); }}, "🗺️ 맵"),
      el("button", {class:"btn slim bad", onclick: ()=>resetAll()}, "🧹 초기화")
    );

    return el("div", {class:"row"}, main, side);
  }

  function renderFinal(){
    setStatus("Report");
    const score = computeScore(state.answers);
    const level = levelFromScore(score.total);

    const main = el("div", {class:"card pad grow"},
      el("div", {class:"big"}, "최종 리포트"),
      el("div", {class:"muted small"}, `총점: ${score.total}/120 · 레벨: ${level}`),
      el("div", {class:"hr"}),
      el("div", {class:"tagrow"},
        el("span", {class:"tag"}, `ROOKIE ${score.bySection.ROOKIE}/40`),
        el("span", {class:"tag"}, `EXPLORER ${score.bySection.EXPLORER}/40`),
        el("span", {class:"tag"}, `MASTER ${score.bySection.MASTER}/40`)
      ),
      el("div", {class:"hr"}),
      el("div", {class:"row"},
        el("button", {class:"btn primary", onclick: ()=>exportLatestJSON()}, "📥 최근 결과 JSON 저장"),
        el("button", {class:"btn good", onclick: ()=>exportLatestCSV()}, "📥 최근 결과 CSV 저장"),
        el("button", {class:"btn warn", onclick: ()=>exportAllAttemptsJSON()}, "📦 전체 기록 JSON 저장")
      ),
      el("div", {class:"hr"}),
      el("div", {class:"row"},
        el("button", {class:"btn", onclick: ()=>{ state.phase="MAP"; saveState(state); render(); }}, "🗺️ 맵"),
        el("button", {class:"btn bad", onclick: ()=>resetAll()}, "🧹 초기화")
      )
    );

    const side = el("div", {class:"card pad side"},
      el("div", {class:"big"}, "가져오기"),
      el("label", {}, "기록 JSON 가져오기"),
      el("input", {type:"file", accept:"application/json", onchange:(e)=>{ const f=e.target.files?.[0]; if (f) importAttemptJSON(f); }})
    );

    return el("div", {class:"row"}, main, side);
  }

  function render(){
    const root = document.getElementById("app");
    root.innerHTML = "";
    if (state.phase==="START") root.appendChild(renderStart());
    else if (state.phase==="MAP") root.appendChild(renderMap());
    else if (state.phase==="PLAY") root.appendChild(renderPlay());
    else if (state.phase==="SECTION_RESULT") root.appendChild(renderSectionResult());
    else if (state.phase==="FINAL") root.appendChild(renderFinal());
    else root.appendChild(renderStart());
  }

  if (!state.config) state.config = {...DEFAULTS};
  if (!state.unlocked) state.unlocked = { ROOKIE:true, EXPLORER:false, MASTER:false };
  if (!state.player) state.player = {name:"", group:""};
  saveState(state);
  render();
</script>
</body>
</html>
